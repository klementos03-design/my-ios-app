name: Build TgWsProxy iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'
      
      - name: Check project structure
        run: |
          echo "=== Files in ios-app ==="
          ls -la ios-app/ || echo "No ios-app directory"
          
          echo ""
          echo "=== Looking for .xcodeproj or .xcworkspace ==="
          find ios-app -name "*.xcodeproj" -o -name "*.xcworkspace" 2>/dev/null || echo "No Xcode project found"
          
          echo ""
          echo "=== Looking for Package.swift ==="
          find ios-app -name "Package.swift" 2>/dev/null || echo "No Swift package found"
      
      - name: Try building with xcodebuild
        run: |
          cd ios-app
          
          # Ищем .xcodeproj или .xcworkspace
          PROJECT=$(find . -name "*.xcodeproj" -o -name "*.xcworkspace" | head -1)
          
          if [ -n "$PROJECT" ]; then
            echo "Found Xcode project: $PROJECT"
            
            # Получаем имя схемы
            SCHEME=$(xcodebuild -list | grep "Schemes:" -A 10 | grep -v "Schemes:" | grep -v "^$" | head -n 1 | xargs)
            echo "Using scheme: $SCHEME"
            
            mkdir -p build
            
            # Собираем архив без подписи
            xcodebuild clean archive \
              -project "${PROJECT%.xcworkspace}" \
              -scheme "$SCHEME" \
              -configuration Release \
              -archivePath build/app.xcarchive \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              PROVISIONING_PROFILE_SPECIFIER="" || \
            echo "Archive failed"
          else
            echo "No Xcode project found, trying Swift Package..."
            
            # Если есть Package.swift, используем swift build
            if [ -f "Package.swift" ]; then
              swift build -c release || echo "Swift build failed"
            else
              echo "No build system found!"
              exit 1
            fi
          fi
      
      - name: Package output
        run: |
          cd ios-app
          mkdir -p output
          
          # Копируем .app из архива
          if [ -d "build/app.xcarchive" ]; then
            cp -r build/app.xcarchive/Products/Applications/*.app output/ 2>/dev/null || true
          fi
          
          # Или из build директории
          find ./build -name "*.app" -type d 2>/dev/null | head -1 | xargs -I {} cp -r {} output/ 2>/dev/null || true
          
          # Показываем результат
          echo "=== Output files ==="
          ls -la output/ || echo "No files in output"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TgWsProxy-build
          path: ios-app/output/
          retention-days: 7
          if-no-files-found: warn
