name: Build TgWsProxy iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'
      
      - name: Build Swift Package for iOS
        run: |
          cd ios-app
          
          echo "=== Building Swift Package ==="
          
          # Создаем папку для сборки
          mkdir -p build
          
          # Собираем Swift Package для iOS
          # Используем правильный SDK и целевую платформу
          swift build \
            -c release \
            --sdk iphoneos \
            --destination generic/platform=iOS \
            || {
              echo "Standard build failed, trying alternative..."
              
              # Пробуем без specific destination
              swift build -c release || true
            }
      
      - name: Find and package built app
        run: |
          cd ios-app
          mkdir -p output
          
          echo "=== Searching for built products ==="
          
          # Ищем .app файлы в разных местах
          find . -name "*.app" -type d 2>/dev/null | while read app_path; do
            echo "Found: $app_path"
            cp -r "$app_path" output/ 2>/dev/null || true
          done
          
          # Также проверяем стандартные пути сборки Swift Package
          if [ -d ".build/release" ]; then
            echo "Checking .build/release directory..."
            ls -la .build/release/ || true
          fi
          
          # Показываем результат
          echo ""
          echo "=== Output files ==="
          ls -la output/ || echo "No files in output yet"
      
      - name: Try building with xcodebuild if swift build failed
        if: always()
        run: |
          cd ios-app
          
          # Если нет файлов в output, пробуем другой метод
          if [ ! "$(ls -A output)" ]; then
            echo "=== Trying xcodebuild method ==="
            
            # Проверяем, есть ли проект Xcode внутри TgWsProxy папки
            if [ -d "TgWsProxy" ]; then
              cd TgWsProxy
              
              # Ищем .xcodeproj или .xcworkspace
              PROJECT=$(find . -name "*.xcodeproj" -o -name "*.xcworkspace" | head -1)
              
              if [ -n "$PROJECT" ]; then
                echo "Found Xcode project in TgWsProxy: $PROJECT"
                
                SCHEME=$(xcodebuild -list | grep "Schemes:" -A 10 | grep -v "Schemes:" | grep -v "^$" | head -n 1 | xargs)
                echo "Using scheme: $SCHEME"
                
                mkdir -p ../build
                
                xcodebuild clean archive \
                  -project "${PROJECT%.xcworkspace}" \
                  -scheme "$SCHEME" \
                  -configuration Release \
                  -archivePath ../build/app.xcarchive \
