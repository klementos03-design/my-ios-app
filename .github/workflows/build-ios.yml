name: Build TgWsProxy iOS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'
      
      - name: Build Swift Package
        run: |
          cd ios-app
          
          echo "=== Building Swift Package ==="
          
          # Создаем папку для сборки
          mkdir -p .build_output
          
          # Собираем Swift Package для iOS
          swift build \
            -c release \
            --sdk "$(xcrun --sdk iphoneos --show-sdk-path)" \
            -Xswiftc "-target" \
            -Xswiftc "arm64-apple-ios16.0" \
            || {
              echo "Failed with SDK, trying without..."
              swift build -c release || true
            }
          
          # Показываем, что получилось
          echo "=== Build directory ==="
          ls -la .build/ 2>/dev/null || echo "No .build directory"
          
          # Ищем все файлы
          echo "=== Looking for built products ==="
          find .build -type f -executable 2>/dev/null | head -10 || echo "No executables found"
      
      - name: Create app bundle manually
        run: |
          cd ios-app
          
          mkdir -p output/TgWsProxy.app
          
          # Копируем Info.plist
          if [ -f "TgWsProxy/Resources/Info.plist" ]; then
            cp TgWsProxy/Resources/Info.plist output/TgWsProxy.app/Info.plist
          fi
          
          # Копируем entitlements
          if [ -f "TgWsProxy/Resources/TgWsProxy.entitlements" ]; then
            cp TgWsProxy/Resources/TgWsProxy.entitlements output/TgWsProxy.app/TgWsProxy.entitlements
          fi
          
          # Ищем и копируем бинарник
          BINARY=$(find .build -type f -executable -name "TgWsProxy" 2>/dev/null | head -1)
          if [ -n "$BINARY" ]; then
            echo "Found binary: $BINARY"
            cp "$BINARY" output/TgWsProxy.app/TgWsProxy
          else
            echo "No binary found, checking other locations..."
            find .build -type f 2>/dev/null | head -20
          fi
          
          # Показываем результат
          echo "=== Output structure ==="
          ls -laR output/ || echo "Output is empty"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TgWsProxy-build
          path: ios-app/output/
          retention-days: 7
          if-no-files-found: warn
