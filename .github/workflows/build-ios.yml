name: Build TgWsProxy iOS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'
      
      - name: Show project structure
        run: |
          echo "=== Files in ios-app ==="
          ls -la ios-app/
          echo ""
          echo "=== Files in ios-app/TgWsProxy ==="
          ls -laR ios-app/TgWsProxy/ | head -30
      
      - name: Build with swift
        run: |
          cd ios-app
          mkdir -p build_output
          
          echo "Building Swift Package..."
          
          # Пробуем собрать
          swift build -c release || echo "Build failed but continuing..."
          
          # Ищем результат сборки
          find . -name "*.app" -type d | head -5
          
          # Копируем найденные .app файлы
          find . -name "*.app" -type d -exec cp -r {} build_output/ \; 2>/dev/null || true
          
          echo "=== Build output ==="
          ls -la build_output/ || echo "No files found"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TgWsProxy-build
          path: ios-app/build_output/
          retention-days: 7
          if-no-files-found: warn
